<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Analytics Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh;background: radial-gradient(circle at top left, #0f172a, #1e293b); margin: 0; font-family: 'Inter', sans-serif;">
    <div class="card animate-in" style="width:100%; max-width:420px; padding:48px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
        <div class="logo" style="justify-content:center; margin-bottom:40px; color: #fff; font-size: 28px;">
            <i class="fa-solid fa-chart-pie" style="color: var(--primary-light)"></i>
            <span style="letter-spacing: 2px;">BI PORTAL</span>
        </div>
        
        <h2 style="text-align:center; margin-bottom:8px; font-weight:800; color: #fff; font-size: 24px;">Welcome Back</h2>
        <p style="text-align:center; margin-bottom:40px; color: #94a3b8; font-size: 15px;">Access your strategic analytics console</p>
        
        <form id="loginForm">
            <div class="form-group" style="margin-bottom:24px;">
                <label style="color: #cbd5e1; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; padding: 14px 16px;">
            </div>
            
            <div class="form-group" style="margin-bottom:32px;">
                <label style="color: #cbd5e1; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Password</label>
                <input type="password" id="password" placeholder="••••••••" required style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; padding: 14px 16px;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:16px; font-size: 16px; border-radius: 14px;">
                Sign In <i class="fa-solid fa-arrow-right" style="margin-left:12px;"></i>
            </button>
        </form>
        
        <div id="error" style="margin-top:24px; color:#fb7185; text-align:center; font-size:14px; display:none; background: rgba(244, 63, 94, 0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(244, 63, 94, 0.2);">
            Invalid email or password ❌
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error");
            const pass = document.getElementById("password").value;
            
            errorDiv.style.display = "none";
            
            try {
                let res = await fetch(`${CONFIG.API_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.status === "success") {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    window.location.href = data.user.role === "admin" ? "admin.html" : "index.html";
                } else {
                    errorDiv.style.display = "block";
                }
            } catch (err) {
                errorDiv.innerText = "Connection error ❌";
                errorDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
