<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Analytics Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body style="display:flex;justify-content:center;align-items:center;padding:20px;">
    <div class="card animate-in" style="width:100%;max-width:400px;padding:40px;">
        <div class="logo" style="justify-content:center;margin-bottom:32px;">
            <i class="fa-solid fa-chart-pie"></i>
            <span>BI PORTAL</span>
        </div>
        
        <h2 style="text-align:center;margin-bottom:8px;font-weight:700;">Welcome Back</h2>
        <p class="text-muted" style="text-align:center;margin-bottom:32px;">Enter your credentials to access the console</p>
        
        <form id="loginForm">
            <div class="form-group" style="margin-bottom:20px;">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group" style="margin-bottom:24px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
                Sign In <i class="fa-solid fa-arrow-right" style="margin-left:8px;"></i>
            </button>
        </form>
        
        <div id="error" style="margin-top:20px;color:var(--danger);text-align:center;font-size:14px;display:none;">
            Invalid email or password ❌
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error");
            const pass = document.getElementById("password").value;
            
            errorDiv.style.display = "none";
            
            try {
                let res = await fetch(`${CONFIG.API_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.status === "success") {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    window.location.href = data.user.role === "admin" ? "admin.html" : "index.html";
                } else {
                    errorDiv.style.display = "block";
                }
            } catch (err) {
                errorDiv.innerText = "Connection error ❌";
                errorDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
