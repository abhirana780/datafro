<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerBI Dashboard - Analytics Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        .full-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 14px 28px;
            border-radius: 100px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
        }
        .back-btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: var(--primary);
            color: #fff;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
            border-color: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="full-container">
        <a href="dashboard.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Portal</span>
        </a>
        <iframe title="NEW SALES DASHBOARD" src="https://app.powerbi.com/reportEmbed?reportId=34cb1af1-706e-4964-9455-8b47f8abad3d&autoAuth=true&ctid=56c1d497-700b-49cf-8f8d-3dd6b20d522f" frameborder="0" allowFullScreen="true"></iframe>
    </div>

    <script>
        window.onload = function() {
            if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
        };
    </script>
</body>
</html>
